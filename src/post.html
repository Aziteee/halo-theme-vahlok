<include src="layout.html">
  <template name="head">
    <title th:text="|${post.spec.title} - ${site.title}|">文章</title>
    <script type="module" src="./js/post.ts"></script>
  </template>

  <article class="article-shell">
    <header class="article-header">
      <div class="essay-meta">
        <span th:if="${not #lists.isEmpty(post.categories)}">
          <a
            class="hover:text-neutral-10"
            th:href="@{${post.categories[0].status.permalink}}"
            th:text="${post.categories[0].spec.displayName}"
          ></a>
          ·
        </span>
        <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.05.24</time>
      </div>
      <h1 class="article-title" th:text="${post.spec.title}">在雨声里整理旧日心绪</h1>
    </header>

    <div class="article-content" th:utext="${post.content.content}"></div>

    <div class="chip-list mt-8" th:if="${not #lists.isEmpty(post.tags)}">
      <a
        class="chip"
        th:each="tag : ${post.tags}"
        th:href="@{${tag.status.permalink}}"
        th:text="${tag.spec.displayName}"
      >
        夜谈
      </a>
    </div>

    <nav
      class="post-nav"
      th:with="cursor = ${postFinder.cursor(post.metadata.name)}"
      aria-label="相邻文章"
    >
      <a th:if="${cursor.hasPrevious()}" th:href="@{${cursor.previous.status.permalink}}">
        <span class="text-neutral-7 block text-sm">上一篇</span>
        <span th:text="${cursor.previous.spec.title}">上一篇文章</span>
      </a>
      <a th:if="${cursor.hasNext()}" th:href="@{${cursor.next.status.permalink}}">
        <span class="text-neutral-7 block text-sm">下一篇</span>
        <span th:text="${cursor.next.spec.title}">下一篇文章</span>
      </a>
    </nav>
  </article>

  <div class="article-shell mt-10" th:if="${haloCommentEnabled}">
    <halo:comment group="content.halo.run" kind="Post" th:attr="name=${post.metadata.name}" />
  </div>
</include>
