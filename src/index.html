<include src="layout.html">
  <template name="head">
    <title th:text="${site.title}">暮灯手札</title>
    <script type="module" src="./js/index.ts"></script>
  </template>

  <section class="home-board" aria-labelledby="hero-title">
    <div class="home-board__copy">
      <div class="home-board__meta" aria-label="站点索引">
        <span class="home-badge home-badge--solid">Issue 01</span>
        <span class="home-badge">Private field notes</span>
      </div>
      <p class="kicker">Vahlok Journal</p>
      <h1 id="hero-title" class="hero-title">把日常写成一份有边角的手稿。</h1>
      <p class="hero-intro">
        这里收存私人随笔、阅读札记和偶然路过的念头。版面尽量安静，但保留一点手工刊物的锋利和偏心。
      </p>
    </div>

    <article class="featured-essay" th:if="${not #lists.isEmpty(posts.items)}">
      <p class="kicker">Latest note</p>
      <p class="essay-meta">
        <span th:if="${not #lists.isEmpty(posts.items[0].categories)}">
          <a
            th:href="@{${posts.items[0].categories[0].status.permalink}}"
            th:text="${posts.items[0].categories[0].spec.displayName}"
          ></a>
          ·
        </span>
        <time th:text="${#temporals.format(posts.items[0].spec.publishTime, 'yyyy.MM.dd')}"
          >2026.05.24</time
        >
      </p>
      <h2 class="essay-title">
        <a th:href="@{${posts.items[0].status.permalink}}" th:text="${posts.items[0].spec.title}">
          在雨声里整理旧日心绪
        </a>
      </h2>
      <p class="essay-excerpt" th:text="${posts.items[0].status.excerpt}">
        雨落在窗沿上时，世界像被翻到一页稍暗的纸。
      </p>
    </article>
  </section>

  <section class="section-block" aria-labelledby="essays-title">
    <div class="section-heading">
      <div>
        <p class="kicker">Recent entries</p>
        <h2 id="essays-title" class="section-title">最近随笔</h2>
      </div>
      <p class="section-note">按时间排布，不做瀑布流，让每一篇标题都有足够的呼吸。</p>
    </div>

    <div class="essay-list" aria-live="polite">
      <include src="post-card.html"></include>
    </div>

    <include src="pagination.html"></include>
  </section>
</include>
