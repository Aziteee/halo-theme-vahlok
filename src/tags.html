<include src="layout.html">
  <template name="head">
    <title th:text="|标签 - ${site.title}|">标签</title>
  </template>

  <section aria-labelledby="tags-title">
    <p class="kicker">Tags</p>
    <h1 id="tags-title" class="hero-title">标签</h1>
    <p class="hero-intro">给散落的念头留下更细的索引。</p>
  </section>

  <section class="section-block">
    <div class="chip-list">
      <a
        class="chip"
        th:each="tag : ${tags}"
        th:href="@{${tag.status.permalink}}"
        th:text="${tag.spec.displayName}"
      >
        夜谈
      </a>
    </div>
  </section>
</include>
