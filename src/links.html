<include src="layout.html">
  <template name="head">
    <title th:text="|${linksTitle} - ${site.title}|">链接</title>
  </template>

  <section aria-labelledby="links-title">
    <p class="text-accent text-xs leading-[1.35] tracking-[0.14em] uppercase">Links</p>
    <h1
      id="links-title"
      class="hero-title text-neutral-10 relative z-[1] m-0 max-w-3xl font-serif leading-tight font-normal"
      th:text="${linksTitle}"
    >
      链接
    </h1>
    <p class="text-neutral-7 relative z-[1] mt-5 max-w-2xl text-base leading-8 sm:text-lg">
      值得驻足的好地方。
    </p>
  </section>

  <section class="my-12 grid gap-[34px]">
    <div
      class="link-empty text-neutral-7 relative overflow-hidden border p-8"
      th:if="${#lists.isEmpty(groups) or (#lists.isEmpty(groups[0].links) and groups.size() == 1)}"
    >
      <p class="text-accent text-xs leading-[1.35] tracking-[0.14em] uppercase">No Links</p>
      <p>还没有添加链接。</p>
    </div>

    <section
      class="link-group relative"
      th:each="g : ${groups}"
      th:if="${not #lists.isEmpty(g.links)}"
    >
      <div class="link-group__heading flex items-end justify-between gap-6 border-b pb-4">
        <div>
          <p
            th:if="${#annotations.contains(g, 'kicker')}"
            th:text="${#annotations.get(g, 'kicker')}"
            class="kicker"
          ></p>
          <h2
            class="section-title text-neutral-10 m-0 font-serif leading-[1.12] font-normal"
            th:text="${g.spec.displayName} ?: '未分组'"
          >
            分组
          </h2>
        </div>
        <span
          class="text-neutral-6 text-xs tracking-[0.14em] whitespace-nowrap uppercase"
          th:text="|${g.links.size()} links|"
          >0 links</span
        >
      </div>

      <div class="grid grid-cols-[repeat(auto-fill,minmax(270px,1fr))] gap-3.5">
        <a
          class="link-card text-neutral-9 relative flex items-center gap-4 overflow-hidden p-4 text-left no-underline"
          th:each="link : ${g.links}"
          th:href="${link.spec.url}"
          target="_blank"
          rel="noopener"
          th:aria-label="|访问 ${link.spec.displayName}|"
        >
          <span class="link-card__logo-wrap shrink-0">
            <img
              class="link-card__logo"
              th:if="${not #strings.isEmpty(link.spec.logo)}"
              th:src="${link.spec.logo}"
              th:alt="${link.spec.displayName}"
            />
            <span
              class="link-card__placeholder text-accent flex h-full w-full items-center justify-center"
              th:unless="${not #strings.isEmpty(link.spec.logo)}"
            >
              <iconify-icon icon="material-symbols:link-rounded"></iconify-icon>
            </span>
          </span>
          <span class="link-card__body">
            <span
              class="text-neutral-10 block font-serif text-lg leading-tight font-normal"
              th:text="${link.spec.displayName}"
              >友链名称</span
            >
            <small
              class="link-card__desc text-neutral-7 mt-2 line-clamp-2 block leading-relaxed"
              th:if="${not #strings.isEmpty(link.spec.description)}"
              th:text="${link.spec.description}"
              >描述</small
            >
          </span>
          <iconify-icon
            class="link-card__external"
            icon="material-symbols:arrow-outward-rounded"
            aria-hidden="true"
          ></iconify-icon>
        </a>
      </div>
    </section>
  </section>
</include>
