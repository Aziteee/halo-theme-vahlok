<include src="layout.html">
  <template name="head">
    <title th:text="|${singlePage.spec.title} - ${site.title}|">页面</title>
  </template>

  <article class="article-shell">
    <header class="article-header">
      <p class="kicker">Page</p>
      <h1 class="article-title" th:text="${singlePage.spec.title}">关于</h1>
    </header>
    <div class="article-content" th:utext="${singlePage.content.content}"></div>
  </article>

  <div class="article-shell mt-10" th:if="${haloCommentEnabled}">
    <halo:comment
      group="content.halo.run"
      kind="SinglePage"
      th:attr="name=${singlePage.metadata.name}"
    />
  </div>
</include>
