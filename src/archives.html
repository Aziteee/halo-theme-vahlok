<include src="layout.html">
  <template name="head">
    <title th:text="|归档 - ${site.title}|">归档</title>
  </template>

  <section aria-labelledby="archives-title">
    <p class="kicker">Archive Codex</p>
    <h1 id="archives-title" class="hero-title">归档</h1>
    <p class="hero-intro">按年份和月份整理文章，适合慢慢回看那些已经写下的片段。</p>
  </section>

  <section class="section-block" th:each="archive : ${archives.items}">
    <div class="section-heading">
      <h2 class="section-title" th:text="${archive.year}">2026</h2>
    </div>

    <th:block th:each="month : ${archive.months}">
      <h3
        class="text-neutral-10 mt-8 mb-4 font-serif text-2xl font-medium"
        th:text="|${month.month} 月|"
      >
        五月
      </h3>
      <div class="essay-list">
        <article class="essay-item" th:each="post, stat : ${month.posts}">
          <span class="essay-item__number" th:text="${stat.count}">I</span>
          <div>
            <p class="essay-meta">
              <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM.dd')}"
                >2026.05.24</time
              >
            </p>
            <h2 class="essay-title">
              <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">
                在雨声里整理旧日心绪
              </a>
            </h2>
            <p class="essay-excerpt" th:text="${post.status.excerpt}">
              雨落在窗沿上时，世界像被翻到一页稍暗的纸。
            </p>
          </div>
        </article>
      </div>
    </th:block>
  </section>

  <nav
    class="pagination"
    th:if="${archives.hasPrevious() || archives.hasNext()}"
    aria-label="归档分页"
  >
    <a th:if="${archives.hasPrevious()}" th:href="@{${archives.prevUrl}}">上一页</a>
    <span th:text="|${archives.page} / ${archives.totalPages}|">1 / 1</span>
    <a th:if="${archives.hasNext()}" th:href="@{${archives.nextUrl}}">下一页</a>
  </nav>
</include>
