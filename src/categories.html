<include src="layout.html">
  <template name="head">
    <title th:text="|分类 - ${site.title}|">分类</title>
  </template>

  <section aria-labelledby="categories-title">
    <p class="kicker">Categories</p>
    <h1 id="categories-title" class="hero-title">分类</h1>
    <p class="hero-intro">把相近的文字收在同一个书脊下。</p>
  </section>

  <section class="section-block">
    <div class="term-grid">
      <article class="term-card" th:each="cat : ${categories}">
        <a th:href="@{${cat.status.permalink}}" th:text="${cat.spec.displayName}"> 日常 </a>
        <p
          class="term-card__description"
          th:if="${not #strings.isEmpty(cat.spec.description)}"
          th:text="${cat.spec.description}"
        >
          分类描述
        </p>
        <div class="chip-list mt-4" th:if="${not #lists.isEmpty(cat.children)}">
          <a
            class="chip"
            th:each="child : ${cat.children}"
            th:href="@{${child.status.permalink}}"
            th:text="${child.spec.displayName}"
          >
            子分类
          </a>
        </div>
      </article>
    </div>
  </section>
</include>
