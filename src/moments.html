<include src="layout.html">
  <template name="head">
    <title th:text="|瞬间 - ${site.title}|">瞬间</title>
  </template>

  <section aria-labelledby="moments-title">
    <p class="kicker">Moments</p>
    <h1 id="moments-title" class="hero-title">瞬间</h1>
    <p class="hero-intro">记录生活的碎片与光影。</p>
  </section>

  <section class="section-block">
    <div class="moments-filter" th:if="${not #lists.isEmpty(tags)}" aria-label="瞬间标签筛选">
      <a
        class="chip"
        th:classappend="${#lists.isEmpty(param.tag) ? 'chip--active' : ''}"
        th:href="@{/moments}"
        >全部
      </a>
      <a
        class="chip"
        th:each="tag : ${tags}"
        th:href="|/moments?tag=${tag.name}|"
        th:classappend="${#arrays.contains(param.tag, tag.name) ? 'chip--active' : ''}"
        th:text="${tag.name} + ' ' + ${tag.momentCount}"
        >标签</a
      >
    </div>

    <div class="moment-empty" th:if="${#lists.isEmpty(moments.items)}">
      <p class="kicker">No Moments</p>
      <p>此刻还没有留下瞬间。</p>
    </div>

    <div class="moment-list" th:if="${not #lists.isEmpty(moments.items)}">
      <article
        class="moment-item"
        th:each="moment : ${moments.items}"
        th:with="content = ${moment.spec.content}"
        th:attr="x-data=|{ name: '${moment.metadata.name}', showComment: false }|"
      >
        <div class="moment-item__rail" aria-hidden="true">
          <span></span>
        </div>

        <div class="moment-date">
          <time th:datetime="${moment.spec.releaseTime}">
            <span th:text="${#temporals.format(moment.spec.releaseTime, 'MM.dd')}">05.24</span>
            <small th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy HH:mm')}"
              >2026 12:00</small
            >
          </time>
        </div>

        <div class="moment-card">
          <div class="moment-body">
            <div
              class="moment-content"
              th:if="${not #strings.isEmpty(content.html)}"
              th:utext="${content.html}"
            ></div>

            <div class="moment-media" th:if="${not #lists.isEmpty(content.medium)}">
              <div
                class="moment-media__grid"
                th:classappend="${content.medium.size() == 1} ? 'moment-media__grid--single' : ''"
              >
                <figure class="moment-media__frame" th:each="item : ${content.medium}">
                  <img
                    th:if="${item.type.name == 'PHOTO'}"
                    th:src="${item.url}"
                    loading="lazy"
                    alt=""
                    class="moment-media__img"
                  />
                  <video
                    th:if="${item.type.name == 'VIDEO'}"
                    th:src="${item.url}"
                    controls
                    preload="metadata"
                    class="moment-media__video"
                  ></video>
                  <audio
                    th:if="${item.type.name == 'AUDIO'}"
                    th:src="${item.url}"
                    controls
                    preload="metadata"
                    class="moment-media__audio"
                  ></audio>
                </figure>
              </div>
            </div>
          </div>

          <div class="moment-stats">
            <div class="chip-list" th:if="${not #lists.isEmpty(moment.spec.tags)}">
              <span
                class="chip chip--sm"
                th:each="tag : ${moment.spec.tags}"
                th:text="|#${tag}|"
              ></span>
            </div>

            <div class="moment-stats__actions">
              <button
                class="moment-stats__item moment-stats__toggle"
                type="button"
                x-bind:class="showComment && 'moment-stats__toggle--active'"
                x-on:click="showComment = !showComment"
                aria-label="展开评论"
              >
                <iconify-icon
                  class="moment-stats__icon mt-1"
                  icon="material-symbols:chat-bubble-outline-rounded"
                ></iconify-icon>
                <span th:text="${moment.stats.approvedComment}">0</span>
              </button>
            </div>
          </div>

          <div class="moment-comments" x-show="showComment" x-cloak>
            <halo:comment
              group="moment.halo.run"
              kind="Moment"
              th:attr="name=${moment.metadata.name}"
            />
          </div>
        </div>
      </article>
    </div>

    <nav
      class="pagination"
      th:if="${moments.hasPrevious() || moments.hasNext()}"
      aria-label="瞬间分页"
    >
      <a
        class="pagination__link pagination__link--prev"
        th:if="${moments.hasPrevious()}"
        th:href="@{${moments.prevUrl}}"
        aria-label="上一页"
      >
        <img class="pagination__arrow" src="./assets/arrow_small.png" alt="" />
      </a>
      <span th:text="|${moments.page} / ${moments.totalPages}|">1 / 1</span>
      <a
        class="pagination__link pagination__link--next"
        th:if="${moments.hasNext()}"
        th:href="@{${moments.nextUrl}}"
        aria-label="下一页"
      >
        <img class="pagination__arrow" src="./assets/arrow_small.png" alt="" />
      </a>
    </nav>
  </section>
</include>
