<include src="layout.html">
  <template name="head">
    <title th:text="|瞬间 - ${site.title}|">瞬间</title>
  </template>

  <section aria-labelledby="moments-title">
    <p class="text-accent text-xs leading-[1.35] uppercase tracking-[0.14em]">Moments</p>
    <h1 id="moments-title" class="hero-title text-neutral-10 relative z-[1] m-0 max-w-3xl font-serif leading-tight font-normal">瞬间</h1>
    <p class="text-neutral-7 relative z-[1] mt-5 max-w-2xl text-base leading-8 sm:text-lg">记录生活的碎片与光影。</p>
  </section>

  <section class="my-12">
    <div class="moments-filter mb-8 flex flex-wrap gap-2 border-b pb-5" th:if="${not #lists.isEmpty(tags)}" aria-label="瞬间标签筛选">
      <a
        class="chip text-neutral-7 hover:text-neutral-10 px-3 py-2 text-sm no-underline"
        th:classappend="${#lists.isEmpty(param.tag) ? 'chip--active' : ''}"
        th:href="@{/moments}"
        >全部
      </a>
      <a
        class="chip text-neutral-7 hover:text-neutral-10 px-3 py-2 text-sm no-underline"
        th:each="tag : ${tags}"
        th:href="|/moments?tag=${tag.name}|"
        th:classappend="${#arrays.contains(param.tag, tag.name) ? 'chip--active' : ''}"
        th:text="${tag.name} + ' ' + ${tag.momentCount}"
        >标签</a
      >
    </div>

    <div class="moment-empty text-neutral-7 border p-8" th:if="${#lists.isEmpty(moments.items)}">
      <p class="text-accent text-xs leading-[1.35] uppercase tracking-[0.14em]">No Moments</p>
      <p>此刻还没有留下瞬间。</p>
    </div>

    <div class="moment-list" th:if="${not #lists.isEmpty(moments.items)}">
      <article
        class="moment-item"
        th:each="moment : ${moments.items}"
        th:with="content = ${moment.spec.content}"
        th:attr="x-data=|{ name: '${moment.metadata.name}', showComment: false }|"
      >
        <div class="moment-item__rail" aria-hidden="true">
          <span></span>
        </div>

        <div class="text-right pt-[10px]">
          <time class="text-neutral-10 font-serif block" th:datetime="${moment.spec.releaseTime}">
            <span class="block text-[22px] leading-[1.1]" th:text="${#temporals.format(moment.spec.releaseTime, 'MM.dd')}">05.24</span>
            <small class="text-neutral-6 mt-1 font-sans text-[11px] block" th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy HH:mm')}"
              >2026 12:00</small
            >
          </time>
        </div>

        <div class="moment-card">
          <div class="moment-body">
            <div
              class="moment-content text-neutral-9 leading-8 text-[15px]"
              th:if="${not #strings.isEmpty(content.html)}"
              th:utext="${content.html}"
            ></div>

            <div class="mt-4" th:if="${not #lists.isEmpty(content.medium)}">
              <div
                class="grid gap-2 grid-cols-[repeat(auto-fill,92px)]"
                th:classappend="${content.medium.size() == 1} ? 'moment-media__grid--single' : ''"
              >
                <figure class="moment-media__frame" th:each="item : ${content.medium}">
                  <img
                    th:if="${item.type.name == 'PHOTO'}"
                    th:src="${item.url}"
                    loading="lazy"
                    alt=""
                    class="moment-media__img"
                  />
                  <video
                    th:if="${item.type.name == 'VIDEO'}"
                    th:src="${item.url}"
                    controls
                    preload="metadata"
                    class="moment-media__video"
                  ></video>
                  <audio
                    th:if="${item.type.name == 'AUDIO'}"
                    th:src="${item.url}"
                    controls
                    preload="metadata"
                    class="moment-media__audio"
                  ></audio>
                </figure>
              </div>
            </div>
          </div>

          <div class="moment-stats flex items-center justify-between flex-wrap gap-3 mt-[18px] pt-[14px]">
            <div class="chip-list flex flex-wrap gap-2" th:if="${not #lists.isEmpty(moment.spec.tags)}">
              <span
                class="chip chip--sm text-neutral-7 hover:text-neutral-10 px-3 py-2 text-sm no-underline"
                th:each="tag : ${moment.spec.tags}"
                th:text="|#${tag}|"
              ></span>
            </div>

            <div class="flex items-center gap-[14px] ml-auto">
              <button
                class="inline-flex items-center gap-1.5 min-h-[30px] text-neutral-7 text-xs no-underline moment-stats__toggle"
                type="button"
                x-bind:class="showComment && 'moment-stats__toggle--active'"
                x-on:click="showComment = !showComment"
                aria-label="展开评论"
              >
                <iconify-icon
                  class="moment-stats__icon mt-1"
                  icon="material-symbols:chat-bubble-outline-rounded"
                ></iconify-icon>
                <span th:text="${moment.stats.approvedComment}">0</span>
              </button>
            </div>
          </div>

          <div class="mt-[14px] pt-[14px]" x-show="showComment" x-cloak>
            <halo:comment
              group="moment.halo.run"
              kind="Moment"
              th:attr="name=${moment.metadata.name}"
            />
          </div>
        </div>
      </article>
    </div>

    <nav
      class="pagination text-neutral-7 mt-8 flex items-center justify-center gap-4 text-sm"
      th:if="${moments.hasPrevious() || moments.hasNext()}"
      aria-label="瞬间分页"
    >
      <a
        class="pagination__link pagination__link--prev"
        th:if="${moments.hasPrevious()}"
        th:href="@{${moments.prevUrl}}"
        aria-label="上一页"
      >
        <img class="pagination__arrow" src="./assets/arrow_small.png" alt="" />
      </a>
      <span th:text="|${moments.page} / ${moments.totalPages}|">1 / 1</span>
      <a
        class="pagination__link pagination__link--next"
        th:if="${moments.hasNext()}"
        th:href="@{${moments.nextUrl}}"
        aria-label="下一页"
      >
        <img class="pagination__arrow" src="./assets/arrow_small.png" alt="" />
      </a>
    </nav>
  </section>
</include>
