<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <slot name="head">
      <title th:text="${site.title}">暮灯手札</title>
    </slot>
    <script type="module" src="./js/main.ts"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" aria-label="站点页眉">
        <a class="site-mark" th:href="@{/}" th:aria-label="|${site.title}首页|">
          <span class="site-mark__title" th:text="${site.title}">Vahlok</span>
          <span class="site-mark__rule" aria-hidden="true"></span>
          <span class="site-mark__subtitle">
            <span>Quiet notes</span>
            <span>from dim light</span>
          </span>
        </a>

        <nav class="site-nav" aria-label="主要导航" th:with="menu = ${menuFinder.getPrimary()}">
          <th:block th:if="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <a
              th:each="item : ${menu.menuItems}"
              th:href="@{${item.status.href}}"
              th:text="${item.status.displayName}"
              th:target="${item.spec.target?.value}"
              x-data="{ isActive: false }"
              x-init="isActive = window.location.pathname === $el.getAttribute('href')"
              x-bind:class="isActive && 'site-nav--active'"
            ></a>
          </th:block>
          <th:block th:if="${menu == null or #lists.isEmpty(menu.menuItems)}">
            <a th:href="@{/}" x-data="{ isActive: false }" x-init="isActive = window.location.pathname === $el.getAttribute('href')" x-bind:class="isActive && 'site-nav--active'">随笔</a>
            <a th:href="@{/archives}" x-data="{ isActive: false }" x-init="isActive = window.location.pathname === $el.getAttribute('href')" x-bind:class="isActive && 'site-nav--active'">归档</a>
            <a th:href="@{/categories}" x-data="{ isActive: false }" x-init="isActive = window.location.pathname === $el.getAttribute('href')" x-bind:class="isActive && 'site-nav--active'">分类</a>
            <a th:href="@{/tags}" x-data="{ isActive: false }" x-init="isActive = window.location.pathname === $el.getAttribute('href')" x-bind:class="isActive && 'site-nav--active'">标签</a>
          </th:block>
        </nav>

        <div class="site-header__meta">
          <p
            class="m-0"
            th:text="|© ${#temporals.format(#temporals.createNow(), 'yyyy')} ${site.title}|"
          >
            © 2026 Vahlok
          </p>
          <p class="m-0 mt-1">Powered by Halo and Vahlok</p>
        </div>
      </header>

      <div class="main-column">
        <main class="site-main">
          <slot />
        </main>
      </div>
    </div>
  </body>
</html>
