<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <slot name="head">
      <title th:text="${site.title}">暮灯手札</title>
    </slot>
    <script type="module" src="./js/main.ts"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" aria-label="站点页眉">
        <a class="site-mark" th:href="@{/}" th:aria-label="|${site.title}首页|">
          <span class="mt-1 block font-serif leading-none uppercase">
            <span class="text-4xl" th:text="${#strings.substring(site.title, 0, 1)}">暮</span
            ><!--
         --><span
              class="text-2xl"
              th:text="${#strings.substring(site.title, 1, #strings.length(site.title) - 1)}"
              >灯手</span
            ><!--
         --><span
              class="text-4xl"
              th:text="${#strings.substring(site.title, #strings.length(site.title) - 1)}"
              >札</span
            >
          </span>
        </a>

        <nav class="site-nav" aria-label="主要导航" th:with="menu = ${menuFinder.getPrimary()}">
          <th:block th:if="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <a
              th:each="item : ${menu.menuItems}"
              th:href="@{${item.status.href}}"
              th:text="${item.status.displayName}"
              th:target="${item.spec.target?.value}"
            ></a>
          </th:block>
          <th:block th:if="${menu == null or #lists.isEmpty(menu.menuItems)}">
            <a th:href="@{/}">随笔</a>
            <a th:href="@{/archives}">归档</a>
            <a th:href="@{/categories}">分类</a>
            <a th:href="@{/tags}">标签</a>
          </th:block>
        </nav>

        <div
          class="text-neutral-6 mt-6 border-t border-[var(--gold-soft)] pt-5 text-xs leading-relaxed"
        >
          <p
            class="m-0"
            th:text="|© ${#temporals.format(#temporals.createNow(), 'yyyy')} ${site.title}|"
          >
            © 2026 暮灯手札
          </p>
          <p class="m-0 mt-1">Powered by Halo and Vahlok</p>
        </div>
      </header>

      <div class="main-column">
        <main class="site-main">
          <slot />
        </main>

        <footer class="site-footer">
          <p th:text="${theme.config.basic?.custom_footer ?: '暮灯手札 · 写于人间微暗处'}">
            暮灯手札 · 写于人间微暗处
          </p>
          <halo:footer />
        </footer>
      </div>
    </div>
  </body>
</html>
