<article class="essay-item" th:each="post, stat : ${posts.items}">
  <span class="essay-item__number" th:text="${stat.count}">I</span>
  <div>
    <p class="essay-meta">
      <span th:if="${not #lists.isEmpty(post.categories)}">
        <a
          class="hover:text-neutral-10"
          th:href="@{${post.categories[0].status.permalink}}"
          th:text="${post.categories[0].spec.displayName}"
        ></a>
        ·
      </span>
      <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM.dd')}">2026.05.24</time>
    </p>
    <h2 class="essay-title">
      <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}">在雨声里整理旧日心绪</a>
    </h2>
    <p class="essay-excerpt" th:text="${post.status.excerpt}">
      雨落在窗沿上时，世界像被翻到一页稍暗的纸。
    </p>
  </div>
</article>
