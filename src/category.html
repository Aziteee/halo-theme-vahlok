<include src="layout.html">
  <template name="head">
    <title th:text="|${category.spec.displayName} - ${site.title}|">分类文章</title>
  </template>

  <section aria-labelledby="category-title">
    <p class="kicker">Category</p>
    <h1 id="category-title" class="hero-title" th:text="${category.spec.displayName}">日常</h1>
    <p
      class="hero-intro"
      th:if="${not #strings.isEmpty(category.spec.description)}"
      th:text="${category.spec.description}"
    >
      分类描述
    </p>
  </section>

  <section class="section-block">
    <div class="essay-list">
      <include src="post-card.html"></include>
    </div>

    <include src="pagination.html"></include>
  </section>
</include>
